kind = "web"
previewPath = "/"
title = "The Watchtower"
version = "1.0.0"
id = "artifacts/watchtower-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21093

[services.development]
run = "pnpm --filter @workspace/watchtower-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/watchtower-app", "run", "build" ]
publicDir = "artifacts/watchtower-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21093"
BASE_PATH = "/"
